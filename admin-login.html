<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/bootstrap.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>CAS - Login Admin</title>
  </head>
  <body data-page="login">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card border-0 bg-satunyalagi rounded-3">
            <div class="card-header bg-transparent text-center border-0">
              <img src="img/login.png" alt="" class="bg-white rounded-circle" />
            </div>
            <div class="card-body p-5">
              <form class="pt-5" data-login-form novalidate>
                <div
                  class="login-error d-none mb-4"
                  role="alert"
                  data-login-error
                >
                  Username atau password salah.
                </div>
                <div class="mb-3">
                  <label for="username" class="form-label h5">Username</label>
                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    placeholder="Masukkan username"
                    autocomplete="username"
                    required
                  />
                </div>
                <div class="mb-3 pt-5">
                  <label for="password" class="form-label h5">Password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    placeholder="Masukkan password"
                    autocomplete="current-password"
                    required
                  />
                </div>
                <div class="text-center pt-5">
                  <button
                    type="submit"
                    class="btn btn-lg rounded-1 bg-utama text-white w-100"
                  >
                    Login
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/bootstrap.js"></script>
    <script src="js/classroom-availability.js"></script>
  </body>
</html>
