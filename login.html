<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/bootstrap.css" />
    <link rel="stylesheet" href="css/custom.css" />
    <title>Login</title>
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card border-0 bg-satunyalagi rounded-3">
            <div class="card-header bg-transparent text-center border-0">
              <img src="img/login.png" alt="" class="bg-white rounded-circle" />
            </div>
            <div class="card-body p-5">
              <form action="admin.html" class="pt-5">
                <div class="mb-3">
                  <label for="username" class="form-label">
                    <h5>Username</h5>
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    placeholder="Masukkan username"
                  />
                </div>
                <div class="mb-3 pt-5">
                  <label for="password" class="form-label">
                    <h5>Password</h5>
                  </label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    placeholder="Masukkan password"
                  />
                </div>
                <div class="text-center pt-5">
                  <button
                    type="submit"
                    class="btn btn-lg rounded-1 bg-utama text-white w-100"
                  >
                    Login
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/bootstrap.js"></script>
  </body>
</html>
